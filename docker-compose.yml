services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-infobridge}
      POSTGRES_USER: ${POSTGRES_USER:-infobridge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-infobridge_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-infobridge} -d ${POSTGRES_DB:-infobridge}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-infobridge}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-infobridge_minio_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://infobridge:infobridge_dev_password@postgres:5432/infobridge
      API_CORS_ORIGINS: http://localhost:5173
      SECRET_KEY: local-dev-secret-change-me
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000/api/v1
    environment:
      PORT: 5173
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
